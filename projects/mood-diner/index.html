<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>MoodDiner - Smart Restaurant Recommender & Booking</title>
    <meta name="description" content="AI-powered mood, occasion, review aggregate, menu inspection, busy times, and weather-aware restaurant recommendation and reservation platform." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const baseUrl = window.location.pathname.endsWith('/') ? window.location.pathname : window.location.pathname + '/';
          navigator.serviceWorker.register(baseUrl + 'sw.js').catch(err => console.warn('SW reg info:', err));
        });
      }
    </script>
  </body>
</html>
