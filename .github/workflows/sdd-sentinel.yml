name: SDD Sentinel (Spec & Quality Gate)

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  sdd-agent-review:
    name: SDD Spec & Quality Sentinel Audit
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js Environment
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            projects/mood-diner/package-lock.json
            projects/portfolio-hub/package-lock.json
            projects/travel-packing-app/package-lock.json
            projects/smart-recipe-app/package-lock.json

      - name: Install Monorepo Dependencies
        shell: powershell
        run: |
          Get-ChildItem -Path projects -Directory | ForEach-Object {
            Write-Host "Installing dependencies for $($_.Name)..."
            Push-Location $_.FullName
            npm install --include=dev
            Pop-Location
          }

      - name: Install Playwright Browsers
        shell: powershell
        run: |
          Push-Location projects/mood-diner
          npx playwright install --with-deps chromium
          Pop-Location

      - name: Harness Sense Layer (informational drift & guardrail scan)
        shell: powershell
        run: |
          node .\scripts\harness-status.mjs

      - name: Run Spec & Schema Coverage Audit
        shell: powershell
        run: |
          .\scripts\validate-specs.ps1 -Strict

      - name: Run Master Harness Test Suite Across All Apps
        shell: powershell
        run: |
          .\scripts\harness.ps1 test all

      - name: Post SDD Sentinel PR Review Comment
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const body = `### 🤖 SDD Sentinel — Spec & Quality Gate Report

            ✅ **All required harness gates passed on this PR.**
            - **Spec & schema coverage audit** (\`validate-specs.ps1 -Strict\`): every app has a spec, README, contract-first Zod schemas, and BDD \`Given-When-Then\` E2E specs. Strict mode fails the run on any gap, so this is enforced, not aspirational.
            - **Master harness suite** (\`harness.ps1 test all\`): lint, type-check, Vitest unit tests, and Playwright E2E + \`@axe-core\` accessibility checks passed for all apps.

            *This comment posts only when the required gates above succeed. See the workflow run logs for the exact per-app check output.*

            *Automated SDD Sentinel comment for PR #${context.issue.number}.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
