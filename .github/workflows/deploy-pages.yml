name: Deploy Portfolio Hub to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache-dependency-path: projects/portfolio-hub/package-lock.json

      - name: Install Portfolio Hub Dependencies
        run: |
          cd projects/portfolio-hub
          npm install --legacy-peer-deps

      - name: Build Portfolio Hub Production Bundle
        run: |
          cd projects/portfolio-hub
          npm run build

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/portfolio-hub/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
