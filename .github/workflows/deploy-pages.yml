name: Deploy Portfolio Hub & All Apps to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            projects/portfolio-hub/package-lock.json
            projects/mood-diner/package-lock.json
            projects/travel-packing-app/package-lock.json
            projects/smart-recipe-app/package-lock.json

      # 1. Build Portfolio Hub (Root Showcase Site)
      - name: Build Portfolio Hub
        run: |
          cd projects/portfolio-hub
          npm install --legacy-peer-deps
          npm run build

      # 2. Build MoodDiner App -> dist/mood-diner
      - name: Build MoodDiner App
        run: |
          cd projects/mood-diner
          npm install --legacy-peer-deps
          npm run build
          mkdir -p ../portfolio-hub/dist/mood-diner
          cp -r dist/* ../portfolio-hub/dist/mood-diner/

      # 3. Build Travel Packing App -> dist/travel-packing-app
      - name: Build Travel Packing App
        run: |
          cd projects/travel-packing-app
          npm install --legacy-peer-deps
          npm run build
          mkdir -p ../portfolio-hub/dist/travel-packing-app
          cp -r out/* ../portfolio-hub/dist/travel-packing-app/

      # 4. Build Smart Kitchen Recipe Manager -> dist/smart-recipe-app
      - name: Build Smart Recipe App
        run: |
          cd projects/smart-recipe-app
          npm install --legacy-peer-deps
          npm run build
          mkdir -p ../portfolio-hub/dist/smart-recipe-app
          cp -r out/* ../portfolio-hub/dist/smart-recipe-app/

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/portfolio-hub/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
