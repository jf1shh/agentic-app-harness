name: Harness Testing Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-apps:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install Monorepo Dependencies
        shell: pwsh
        run: |
          Get-ChildItem -Path ./projects -Directory | ForEach-Object {
            Write-Host "Installing dependencies for $($_.Name)..."
            Push-Location $_.FullName
            npm install --include=dev
            Pop-Location
          }

      - name: Install Playwright Browsers
        shell: pwsh
        run: |
          Push-Location ./projects/mood-diner
          npx playwright install --with-deps chromium
          Pop-Location

      - name: Run Test Suite across all Apps
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Path ./projects -Directory
          foreach ($project in $projects) {
            Write-Host "Running tests for $($project.Name)"
            ./scripts/test-app.ps1 -AppName $project.Name
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Tests failed for $($project.Name)" -ForegroundColor Red
              exit 1
            }
          }
